  <!-- hreflang -->
  <link rel="alternate" hreflang="ko" href="https://claude-news.today/#/">
  <link rel="alternate" hreflang="en" href="https://claude-news.today/#/en/">
  <link rel="alternate" hreflang="ja" href="https://claude-news.today/#/ja/">
  <link rel="alternate" hreflang="x-default" href="https://claude-news.today/#/">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.min.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #a78bfa;
      --cover-background-color: #0f172a;
    }

    /* Cover page */
    section.cover {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%) !important;
    }
    section.cover .mask {
      background: none !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
    section.cover .cover-main {
      color: #f1f5f9 !important;
      z-index: 1;
      position: relative;
    }
    section.cover h1 {
      color: #fff !important;
      border: none !important;
      font-size: 2.5rem !important;
      font-weight: 800 !important;
    }
    section.cover blockquote {
      border: none !important;
      margin: 0 !important;
    }
    section.cover blockquote p {
      color: #cbd5e1 !important;
      font-size: 1.2rem !important;
    }
    section.cover ul {
      list-style: none !important;
      padding: 0 !important;
    }
    section.cover ul li {
      color: #94a3b8 !important;
      font-size: 1rem !important;
      margin: 0.3rem 0 !important;
    }
    /* Cover buttons */
    section.cover p:last-child a {
      display: inline-block !important;
      color: #fff !important;
      background: #7c3aed !important;
      border: none !important;
      border-radius: 2rem !important;
      padding: 0.75rem 2rem !important;
      font-size: 1rem !important;
      font-weight: 600 !important;
      text-decoration: none !important;
      margin: 0.5rem 0.3rem !important;
      cursor: pointer !important;
      z-index: 10 !important;
      position: relative !important;
    }
    section.cover p:last-child a:hover {
      background: #6d28d9 !important;
    }

    /* Sidebar */
    .sidebar-nav li a { font-size: 14px; }
    .lang-switcher {
      text-align: center;
      padding: 8px 0 12px;
      font-size: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 8px;
    }
    .lang-switcher a {
      color: #a78bfa;
      text-decoration: none;
      margin: 0 6px;
    }
    .lang-switcher a:hover { text-decoration: underline; }
    .lang-switcher strong { color: #fff; margin: 0 6px; }

    /* Content */
    .markdown-section { max-width: 800px; }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'Claude Code Daily Briefing',
      // repo: removed
      loadSidebar: true,
      coverpage: true,
      onlyCover: true,
      auto2top: true,
      subMaxLevel: 2,
      alias: {},
      search: {
        placeholder: 'Search...',
        noData: 'No results',
        paths: 'auto',
        depth: 1
      },
      pagination: {
        previousText: 'Newer',
        nextText: 'Older'
      },
      plugins: [
        function(hook) {
          // Inject language switcher into sidebar
          // Dynamic meta tags per language
          hook.doneEach(function() {
            var hash = window.location.hash || '';
            var meta = {
              ko: { title: 'Claude Code 데일리 브리핑', desc: 'Claude Code, Anthropic 최신 뉴스를 매일 한국어로 전달합니다.', locale: 'ko_KR' },
              en: { title: 'Claude Code Daily Briefing', desc: 'Daily AI news covering Claude Code updates, Anthropic releases, and developer ecosystem.', locale: 'en_US' },
              ja: { title: 'Claude Code デイリーブリーフィング', desc: 'Claude Code、Anthropicの最新ニュースを毎日日本語でお届けします。', locale: 'ja_JP' }
            };
            var lang = hash.startsWith('#/en/') ? 'en' : hash.startsWith('#/ja/') ? 'ja' : 'ko';
            var m = meta[lang];
            document.title = m.title;
            document.querySelector('meta[name="description"]').content = m.desc;
            document.querySelector('meta[property="og:title"]').content = m.title;
            document.querySelector('meta[property="og:description"]').content = m.desc;
            document.querySelector('meta[property="og:locale"]').content = m.locale;
            document.querySelector('meta[name="twitter:title"]').content = m.title;
            document.querySelector('meta[name="twitter:description"]').content = m.desc;
          });

          hook.doneEach(function() {
            var sidebar = document.querySelector('.sidebar');
            if (!sidebar) return;
            var existing = sidebar.querySelector('.lang-switcher');
            if (existing) existing.remove();
            var nav = sidebar.querySelector('.sidebar-nav');
            if (!nav) return;
            var hash = window.location.hash || '';
            var isEn = hash.startsWith('#/en/');
            var isJa = hash.startsWith('#/ja/');
            var div = document.createElement('div');
            div.className = 'lang-switcher';
            div.innerHTML = (isEn || isJa ? '<a href="#/">KO</a>' : '<strong>KO</strong>')
              + ' · '
              + (isEn ? '<strong>EN</strong>' : '<a href="#/en/">EN</a>')
              + ' · '
              + (isJa ? '<strong>JA</strong>' : '<a href="#/ja/">JA</a>');
            nav.parentNode.insertBefore(div, nav);
          });

          hook.ready(function() {
            // Cover page button click handler
            document.addEventListener('click', function(e) {
              var link = e.target.closest('section.cover a');
              if (link) {
                var href = link.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('http')) {
                  e.preventDefault();
                  window.location.hash = '#/' + href;
                }
              }
            });

            // Save language preference on navigation
            window.addEventListener('hashchange', function() {
              var hash = window.location.hash;
              if (hash.startsWith('#/en/')) localStorage.setItem('claude-news-lang', 'en');
              else if (hash.startsWith('#/ja/')) localStorage.setItem('claude-news-lang', 'ja');
              else if (hash.startsWith('#/briefings/') || hash === '#/') localStorage.setItem('claude-news-lang', 'ko');
            });

            // Redirect returning users to their saved language
            var saved = localStorage.getItem('claude-news-lang');
            var hash = window.location.hash;
            if (saved && (hash === '' || hash === '#/' || hash === '#')) {
              var latestDate = 'briefing-2026-02-28';
              var paths = {
                ko: '#/briefings/' + latestDate,
                en: '#/en/briefings/' + latestDate,
                ja: '#/ja/briefings/' + latestDate
              };
              window.location.hash = paths[saved];
            }
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
</body>
</html>
